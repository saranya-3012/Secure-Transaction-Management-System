name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # Step 2: Fetch full Git history for proper SonarCloud blame info
      - name: Fetch full Git history
        run: git fetch --unshallow || echo "Already full clone"

      # Step 3: Set up Java
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 4: Cache Maven dependencies for faster builds
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      # Step 5: Build and test project
      - name: Build and test with Maven
        run: mvn clean verify -U

      # Step 6: SonarCloud scan (non-blocking if it fails)
      - name: SonarCloud Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=saranya-3012_secure-transaction-management-system \
            -Dsonar.organization=saranya-3012 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
